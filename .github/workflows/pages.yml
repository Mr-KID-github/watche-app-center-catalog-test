name: Publish Catalog Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node tools/validate-catalog.mjs apps.json
      - name: Build static catalog
        run: |
          rm -rf public
          mkdir -p public
          cp apps.json public/apps.json
          cp -R apps public/apps
          cp -R schemas public/schemas
          touch public/.nojekyll
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>WatcheRobot App.Center Catalog Test</title>
          </head>
          <body>
            <main>
              <h1>WatcheRobot App.Center Catalog Test</h1>
              <p><a href="./apps.json">apps.json</a></p>
            </main>
          </body>
          </html>
          HTML
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish catalog pages"
          git branch -M gh-pages
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
